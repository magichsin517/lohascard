name: 每日爬蟲 — 樂齡網 + 弘道 + 台北旅遊網 + 台中文化局

# 每天台北時間凌晨 3:15 跑(= UTC 19:15 前一日)
# 也可以手動到 Actions 頁面按 "Run workflow"
#
# 改版紀錄(2026-04-18):
#   原本所有 scraper 在同一個 job 內串接跑,樂齡網 8-12min 吃掉大部分時間
#   導致整個 job 撞到 10 分鐘 timeout 被 cancel。
#   改成平行 jobs,每個 scraper 自己一個 job,互不干擾。
#   優點:一支卡死不影響其他、每支各自的 log 好看、總時間看最慢那支。

on:
  schedule:
    - cron: '15 19 * * *'
  workflow_dispatch:

jobs:
  # 教育部樂齡學習網:全台 22 縣市,跑最久(8-12 min),給它獨立 job
  senioredu:
    name: 樂齡網 (教育部,全台 22 縣市)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run senioredu_moe
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/scrape/senioredu_moe.py --upsert --sleep 0.5

  # 弘道老人福利基金會:活動消息,約 1-2 min
  hondao:
    name: 弘道基金會 (活動消息)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run hondao
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/scrape/hondao.py --upsert --sleep 0.5

  # 台北旅遊網 RSS:10 筆,約 30 秒
  gov_taipei:
    name: 台北旅遊網 (RSS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run gov_taipei
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/scrape/gov_taipei.py --upsert --sleep 0.5

  # 台中市政府文化局:幾百筆藝文活動,約 1-3 min
  gov_taichung:
    name: 台中文化局 (藝文活動 JSON)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run gov_taichung
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/scrape/gov_taichung.py --upsert --sleep 0.5
