name: 每日爬蟲 — 教育部樂齡學習網

# 每天台北時間凌晨 3:15 跑(= UTC 19:15 前一日)
# 也可以手動到 Actions 頁面按 "Run workflow"
on:
  schedule:
    - cron: '15 19 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run 樂齡網 scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/scrape/senioredu_moe.py --upsert --sleep 0.5
