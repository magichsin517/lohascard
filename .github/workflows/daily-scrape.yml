name: 每日爬蟲 — 樂齡網 + 弘道 + 台北旅遊網 + 台中文化局

# 每天台北時間凌晨 3:15 跑(= UTC 19:15 前一日)
# 也可以手動到 Actions 頁面按 "Run workflow"
on:
  schedule:
    - cron: '15 19 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run 樂齡網 scraper (教育部樂齡學習網全台 22 縣市)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/scrape/senioredu_moe.py --upsert --sleep 0.5

      - name: Run 弘道基金會 scraper (活動消息)
        # 弘道 server 非台灣 gov,GH Actions 連得到、不 timeout。
        # 失敗不影響後續 step(continue-on-error),確保其他 scraper 照常跑。
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/scrape/hondao.py --upsert --sleep 0.5

      - name: Run 台北旅遊網 scraper (活動展演 + 活動年曆 Open API)
        # 台北旅遊網是官方 Open API(JSON),穩定度高。
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/scrape/gov_taipei.py --upsert --sleep 0.5

      - name: Run 台中文化局 scraper (藝文活動查詢 JSON)
        # 台中市政府文化局 activity.culture.taichung.gov.tw 開放 JSON,
        # 涵蓋 29 個區的藝文活動(展覽/表演/講座/研習/影片欣賞等)。
        # 單次量大(幾百筆),但多數是長期展覽,dedup 後每日新增量不高。
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/scrape/gov_taichung.py --upsert --sleep 0.5
